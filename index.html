<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Клавогонки</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ======= Storage warning banner ======= -->
  <div id="storage-warning" class="storage-warning hidden"></div>

  <!-- ======= Home screen ======= -->
  <div id="screen-list" class="screen active">
    <h1 class="app-title">Клавогонки</h1>

    <div class="level-select-section">
      <p class="level-select-label">Уровень сложности</p>
      <div id="level-buttons-main" class="level-buttons"></div>
      <p class="level-chars-hint" id="level-chars-hint"></p>
      <p class="level-lock-hint" id="level-lock-hint"></p>
    </div>

    <button id="btn-start" class="btn-primary btn-start">Начать</button>

    <div class="settings-row--main">
      <label class="setting-toggle">
        <input type="checkbox" id="setting-show-finger" checked>
        Показывать следующий палец
      </label>
      <div class="text-set-row">
        <label class="text-set-label">Текст:
          <select id="text-set-select">
            <option value="neznaika">Незнайка</option>
            <option value="winnie">Винни-Пух</option>
          </select>
        </label>
      </div>
    </div>

    <div id="achievements-section">
      <button id="btn-achievements" class="btn-achievements">Мои достижения</button>
      <div id="achievements-panel" class="achievements-panel hidden">
        <div id="achievements-unlock-hint" class="achievements-unlock-hint" style="display:none">Режим редактирования — кликай для галочки</div>
        <ul class="achievements-list" id="achievements-list"></ul>
      </div>
    </div>

    <div id="stats-section">
      <h2 class="stats-title">Статистика</h2>
      <div id="player-level-display" class="player-level-display"></div>
      <div id="stats-summary"></div>
      <p id="level-progress-hint" class="level-progress-hint"></p>
      <div class="stats-view-toggle">
        <button id="btn-view-runs" class="stats-view-btn active">Заезды</button>
        <button id="btn-view-days" class="stats-view-btn">Дни</button>
      </div>
      <div id="stats-charts"></div>
      <div id="stats-table-controls">
        <div id="stats-file-controls">
          <button id="btn-refresh-gist" class="hidden">↻ Обновить</button>
          <button id="btn-push-gist" class="hidden">↑ Отправить</button>
          <span id="refresh-status" class="refresh-status"></span>
          <button id="btn-export-stats">Экспорт .txt</button>
          <span id="storage-size" class="storage-size"></span>
        </div>
      </div>
      <div id="stats-table-wrap"></div>
    </div>

  </div>

  <!-- ======= Exercise screen ======= -->
  <div id="screen-exercise" class="screen">
    <div class="exercise-header">
      <button id="btn-back" class="btn-ghost">← Назад</button>
      <span id="exercise-level-label" class="exercise-title-label"></span>
      <span id="live-progress" class="live-stat">0%</span>
      <span id="live-cpm" class="live-stat">— зн/мин</span>
      <span id="live-timer" class="live-timer">0:00</span>
    </div>

    <div id="track-container" class="track-container">
      <svg id="track-svg" viewBox="0 0 500 72" style="width:100%;display:block">
        <rect width="500" height="72" fill="#f0fdf4"/>
        <rect x="0" y="22" width="500" height="28" fill="#1f2937"/>
        <line x1="0" y1="22" x2="500" y2="22" stroke="white" stroke-width="1.5" opacity="0.35"/>
        <line x1="0" y1="50" x2="500" y2="50" stroke="white" stroke-width="1.5" opacity="0.35"/>
        <line x1="0" y1="36" x2="500" y2="36" stroke="#4b5563" stroke-width="1.5" stroke-dasharray="18,10"/>
        <rect x="0" y="22" width="7" height="28" fill="white" opacity="0.65"/>
        <rect x="493" y="22" width="7" height="10" fill="white"/>
        <rect x="493" y="32" width="7" height="8" fill="#111827"/>
        <rect x="493" y="40" width="7" height="10" fill="white"/>
        <g id="track-car" transform="translate(18,36)">
          <rect x="-11" y="-8" width="6" height="5" rx="1" fill="#111827"/>
          <rect x="-11" y="3" width="6" height="5" rx="1" fill="#111827"/>
          <rect x="5" y="-8" width="6" height="5" rx="1" fill="#111827"/>
          <rect x="5" y="3" width="6" height="5" rx="1" fill="#111827"/>
          <rect x="-12" y="-7" width="24" height="14" rx="4" fill="white" opacity="0.35"/>
          <rect id="track-car-body" x="-10" y="-6" width="20" height="12" rx="3" fill="#dc2626"/>
          <rect x="2" y="-5" width="6" height="5" rx="1" fill="#bfdbfe" opacity="0.8"/>
        </g>
      </svg>
    </div>

    <div class="car-color-picker">
      <span class="car-color-label">Цвет:</span>
      <button class="car-swatch active" data-color="#dc2626" style="background:#dc2626"></button>
      <button class="car-swatch" data-color="#2563eb" style="background:#2563eb"></button>
      <button class="car-swatch" data-color="#16a34a" style="background:#16a34a"></button>
      <button class="car-swatch" data-color="#7c3aed" style="background:#7c3aed"></button>
      <button class="car-swatch" data-color="#ea580c" style="background:#ea580c"></button>
      <button class="car-swatch" data-color="#0891b2" style="background:#0891b2"></button>
      <button class="car-swatch" data-color="#db2777" style="background:#db2777"></button>
      <button class="car-swatch" data-color="#86efac" style="background:#86efac"></button>
      <button class="car-swatch" data-color="#111827" style="background:#111827"></button>
      <button class="car-swatch" data-color="#78350f" style="background:#78350f"></button>
      <button class="car-swatch" data-color="#f9fafb" style="background:#f9fafb;border:1px solid #d1d5db"></button>
      <button class="car-swatch" data-color="#9ca3af" style="background:#9ca3af"></button>
    </div>

    <div id="finger-hint" class="finger-hint"></div>

    <div id="text-display" class="text-display"></div>

    <div class="input-row">
      <div id="word-display" class="word-display"></div>
      <input
        id="word-input"
        class="word-input-hidden"
        type="text"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        disabled
      >
    </div>

    <div class="hand-image-row">
      <img id="hand-image" class="hand-image" src="" alt="">
    </div>

  </div>

  <!-- ======= Result overlay ======= -->
  <div id="result-overlay" class="result-overlay hidden">
    <div class="result-card">
      <h2 class="result-title" style="display:none"></h2>
      <svg id="finish-svg" viewBox="0 0 300 150" style="width:100%;max-width:300px;display:block;margin:0 auto 10px">
        <rect width="300" height="150" fill="#d1fae5" rx="6"/>
        <rect x="0" y="96" width="300" height="54" fill="#1f2937"/>
        <line x1="0" y1="96" x2="300" y2="96" stroke="white" stroke-width="1.5" opacity="0.3"/>
        <line x1="0" y1="123" x2="300" y2="123" stroke="#374151" stroke-width="1.5" stroke-dasharray="18,10"/>
        <rect x="242" y="96" width="7" height="9" fill="white"/>
        <rect x="242" y="105" width="7" height="9" fill="#111"/>
        <rect x="242" y="114" width="7" height="9" fill="white"/>
        <rect x="242" y="123" width="7" height="9" fill="#111"/>
        <rect x="242" y="132" width="7" height="9" fill="white"/>
        <rect x="242" y="141" width="7" height="9" fill="#111"/>
        <g transform="translate(225,123)">
          <rect x="-11" y="-8" width="6" height="5" rx="1" fill="#111827"/>
          <rect x="-11" y="3" width="6" height="5" rx="1" fill="#111827"/>
          <rect x="5" y="-8" width="6" height="5" rx="1" fill="#111827"/>
          <rect x="5" y="3" width="6" height="5" rx="1" fill="#111827"/>
          <rect id="finish-car-body" x="-10" y="-6" width="20" height="12" rx="3" fill="#dc2626"/>
          <rect x="2" y="-5" width="6" height="5" rx="1" fill="#bfdbfe" opacity="0.8"/>
        </g>
        <rect x="143" y="68" width="4" height="28" fill="#92400e" rx="1"/>
        <rect x="40" y="8" width="210" height="60" fill="#fef9c3" rx="3"/>
        <rect x="40" y="8" width="210" height="60" fill="none" stroke="#d97706" stroke-width="2" rx="3"/>
        <text x="145" y="38" text-anchor="middle" dominant-baseline="central" font-size="21" font-weight="800" fill="#78350f" font-family="system-ui,sans-serif">Ура, финиш!</text>
        <g id="finish-record-badge" style="display:none">
          <polygon points="200,8 250,8 250,58" fill="#dc2626"/>
          <text x="225" y="33" text-anchor="middle" dominant-baseline="central" transform="rotate(45,225,33)" font-size="10" font-weight="700" fill="white" font-family="system-ui,sans-serif">рекорд</text>
        </g>
      </svg>
      <p id="result-record-label" class="result-record-label"></p>
      <div class="result-stats">
        <div class="result-stat">
          <span class="result-stat-label">Время</span>
          <span id="result-time" class="result-stat-value">—</span>
        </div>
        <div class="result-stat">
          <span class="result-stat-label">Скорость</span>
          <span id="result-cpm" class="result-stat-value">—</span>
        </div>
        <div class="result-stat">
          <span class="result-stat-label">Символов</span>
          <span id="result-chars" class="result-stat-value">—</span>
        </div>
        <div class="result-stat">
          <span class="result-stat-label">Ошибок</span>
          <span id="result-errors" class="result-stat-value">—</span>
        </div>
      </div>
      <div class="result-actions">
        <button id="btn-next" class="btn-primary">Следующий →</button>
      </div>
    </div>
  </div>

  <!-- ======= Sync admin overlay ======= -->
  <div id="sync-overlay" class="sync-overlay hidden">
    <div class="sync-panel">
      <div class="sync-panel-header">
        <h3 id="sync-panel-title" class="sync-panel-title"></h3>
        <button id="btn-close-sync" class="btn-ghost">✕</button>
      </div>
      <p id="sync-hint-text" class="sync-hint"></p>
      <div id="sync-row-token" class="sync-row">
        <label class="sync-label">GitHub-токен (скоуп: gist)</label>
        <input id="sync-token" type="password" class="sync-input" placeholder="ghp_...">
      </div>
      <div id="sync-row-gist-id" class="sync-row">
        <label class="sync-label">ID гиста</label>
        <input id="sync-gist-id" class="sync-input" placeholder="заполнится после «Создать гист»">
      </div>
      <div class="sync-actions">
        <button id="btn-create-gist" class="btn-sync">Создать гист</button>
        <button id="btn-pull-gist"   class="btn-sync">Загрузить</button>
      </div>
      <p id="sync-status" class="sync-status"></p>
    </div>
  </div>

  <!-- ======= Replay overlay ======= -->
  <div id="replay-overlay" class="replay-overlay hidden">
    <div class="replay-card">
      <div class="replay-header">
        <h2 class="replay-title" id="replay-title"></h2>
        <button id="btn-close-replay" class="btn-ghost">✕</button>
      </div>
      <div id="replay-text-display" class="text-display replay-text-display"></div>
      <div id="replay-word-display" class="word-display replay-word-display"></div>
      <div class="replay-controls">
        <button id="btn-replay-playpause" class="btn-primary replay-playpause">⏸</button>
        <button id="btn-replay-restart" class="btn-ghost">↺</button>
        <span class="replay-speed-label">Скорость:</span>
        <button class="btn-speed" data-speed="0.5">0.5×</button>
        <button class="btn-speed active" data-speed="1">1×</button>
        <button class="btn-speed" data-speed="2">2×</button>
        <button class="btn-speed" data-speed="4">4×</button>
        <span id="replay-progress" class="replay-progress"></span>
      </div>
    </div>
  </div>

  <!-- ======= Error detail overlay ======= -->
  <div id="error-detail-overlay" class="error-detail-overlay hidden">
    <div class="error-detail-card">
      <div class="error-detail-header">
        <h2 class="error-detail-title" id="error-detail-title"></h2>
        <button id="btn-close-detail" class="btn-ghost">✕</button>
      </div>
      <div id="error-detail-body" class="error-detail-body"></div>
    </div>
  </div>

  <script src="version.js"></script>
  <script src="texts.js"></script>
  <script src="fingers.js"></script>
  <script src="stats.js"></script>
  <script src="app.js"></script>
</body>
</html>
